<!DOCTYPE html>
<html>
<head>
    <title>Simulation Results</title>
</head>
<body>
    <h1>Simulation Results for Sawmill {{ sawmill_id }}</h1>
    <p>Total Days Simulated: {{ total_days }}</p>
    <p>Number of Replications: {{ number_of_replications }}</p>

    <h2>Sawmill Plots</h2>
    <img src="{{ url_for('static', filename='plots/queue_sawmill_' + sawmill_id + '.png') }}" alt="Crane Queue">
    <img src="{{ url_for('static', filename='plots/scalein_' + sawmill_id + '.png') }}" alt="Scale-in Wait">
    <img src="{{ url_for('static', filename='plots/crane_wait_' + sawmill_id + '.png') }}" alt="Crane Wait">

    <h2>Logging Site Plots</h2>
    {% for site_id in avg_result.queue_lengths.keys() %}
        <h3>Logging Site: {{ site_id }}</h3>
        <img src="{{ url_for('static', filename='plots/queue_' + site_id + '.png') }}" alt="Queue at {{ site_id }}">
        <img src="{{ url_for('static', filename='plots/wait_' + site_id + '.png') }}" alt="Wait Time at {{ site_id }}">
        <img src="{{ url_for('static', filename='plots/loading_' + site_id + '.png') }}" alt="Loading Time at {{ site_id }}">
        <img src="{{ url_for('static', filename='plots/idle_' + site_id + '.png') }}" alt="Idle Time at {{ site_id }}">
    {% endfor %}
    <br>
    <a href="/">Back to Selection</a>
</body>
</html>
